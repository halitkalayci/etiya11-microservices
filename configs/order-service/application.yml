# order-service ortak (tüm profiller) konfigürasyonu.
server:
  port: 0

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          # Keycloak realm'i: token imzaları bu issuer'ın JWKS endpoint'inden doğrulanır.
          issuer-uri: http://localhost:8090/realms/etiya-crm-project
  # H2 in-memory database backing the Transactional Outbox table.
  datasource:
    url: jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true      
      path: /h2-console
      settings:
        web-allow-others: true
  cloud:
    stream:
      kafka:
        binder:
          brokers: localhost:9092
      bindings:
        # Producer: the outbox relay sends OrderCreated payloads here -> Kafka topic "order-created"
        orderCreated-out-0:
          destination: order-created

# Transactional Outbox polling publisher (Spring @Scheduled).
outbox:
  poller:
    fixed-delay: 15000   # ms between polls
    batch-size: 100     # max events published per poll
    max-retry: 5        # relay attempts before an event is marked FAILED

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  client:
    register-with-eureka: true # kendini ayağa kalktığın an eurekaya tanıt
    fetch-registry: true # istenildiğinde diğer servislerin bilgisini çek
  instance:
    instance-id: ${spring.application.name}:${random.uuid}
    prefer-ip-address: true
